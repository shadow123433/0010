<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div id="modalOverlay" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h2>Aviso</h2>
      <p id="modalMessage"></p>
      <button type="button" onclick="fecharModal()">Fechar</button>
    </div>
  </div>

  <button class="voltar-btn" onclick="history.back()">← Voltar</button>

  <main class="login-container">
    <h1>Entrar</h1>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />

      <div class="senha-container">
        <input type="password" id="senha" placeholder="Senha" required />
        
        <img 
          src="https://img.icons8.com/material-outlined/24/000000/invisible.png" 
          id="toggleSenhaIcon" 
          alt="Mostrar senha"
          class="toggle-senha"
        >
      </div>

      <button type="submit">Entrar</button>
    </form>

    <p>
      Não tem conta?
      <a href="register.html">Criar agora</a>
    </p>
  </main>

  <script src="auth.js"></script>
</body>
</html>
